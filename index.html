<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panoramia Capital</title>
  <meta name="description" content="Panoramia Capital — research and trading analytics.">
  <meta name="robots" content="noindex">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0e1117; /* matches Streamlit dark theme while loading */
    }
    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh; /* mobile Safari viewport fix */
      border: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fafafa;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
  </style>
</head>
<body>
  <div id="loading">Panoramia Capital</div>
  <iframe
    id="app"
    src="https://REPLACE-WITH-YOUR-SUBDOMAIN.streamlit.app/?embed=true"
    allow="clipboard-write; fullscreen"
    onload="document.getElementById('loading').style.opacity = 0;">
  </iframe>
</body>
</html>
