<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panoramia Capital</title>
  <meta name="description" content="Panoramia Capital — research and trading analytics.">
  <meta name="robots" content="noindex">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #f0f2f6; /* matches the app body; hides the host card's rounded-corner slivers */
    }
    /* Streamlit Cloud's embed host wraps the app in a card: 2px border,
       12px radius, 32px bottom meta bar ("Built with Streamlit" / "Fullscreen").
       None of it is removable via embed_options, so the iframe is oversized
       by exactly those amounts and the chrome is cropped out of the viewport. */
    #app {
      position: fixed;
      top: -2px;
      left: -2px;
      width: calc(100% + 4px);
      height: calc(100% + 36px);
      height: calc(100dvh + 36px); /* mobile Safari viewport fix */
      border: none;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #31333f;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
  </style>
</head>
<body>
  <div id="loading">Panoramia Capital</div>
  <iframe
    id="app"
    src="https://panoramiacapital.streamlit.app/?embed=true"
    allow="clipboard-write; fullscreen"
    onload="document.getElementById('loading').style.opacity = 0;">
  </iframe>
</body>
</html>
